<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 900 520">
  <style>
    .title { font: 18px sans-serif; font-weight: 600; }
    .subtitle { font: 13px sans-serif; fill: #444; }
    .stage-label { font: 13px sans-serif; font-weight: 600; }
    .node-label { font: 12px sans-serif; text-anchor: middle; dominant-baseline: middle; }
    .small-label { font: 10px sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #444; }
    .box { fill: #f8f8f8; stroke: #333; stroke-width: 1; }
    .cluster { fill-opacity: 0.18; stroke-width: 1.2; }
    .same { stroke: #333; stroke-width: 1.5; opacity: 0.75; }
    .shift { stroke: #1f77b4; stroke-width: 1.5; opacity: 0.75; }
    .outwire { stroke: #666; stroke-width: 1.3; opacity: 0.75; }
  </style>

  <!-- Title -->
  <text x="450" y="24" text-anchor="middle" class="title">
    8-lane Rotate-Right Barrel Shifter
  </text>
  <text x="450" y="44" text-anchor="middle" class="subtitle">
    shift = s0×1 + s1×2 + s2×4,  out[i] = in[(i - shift) mod 8]
  </text>

  <!-- Stage background boxes -->
  <rect x="10"  y="60" width="105" height="410" rx="10" class="cluster" fill="#dddddd" stroke="#999"/>
  <text x="62" y="78" text-anchor="middle" class="stage-label">Inputs</text>

  <rect x="150" y="60" width="125" height="410" rx="10" class="cluster" fill="#aaccee" stroke="#6c9fc7"/>
  <text x="212" y="78" text-anchor="middle" class="stage-label">Stage 0</text>
  <text x="212" y="94" text-anchor="middle" class="subtitle">s0: shift 1</text>

  <rect x="360" y="60" width="125" height="410" rx="10" class="cluster" fill="#bbddbb" stroke="#80b080"/>
  <text x="422" y="78" text-anchor="middle" class="stage-label">Stage 1</text>
  <text x="422" y="94" text-anchor="middle" class="subtitle">s1: shift 2</text>

  <rect x="570" y="60" width="125" height="410" rx="10" class="cluster" fill="#ffddaa" stroke="#d6a45f"/>
  <text x="632" y="78" text-anchor="middle" class="stage-label">Stage 2</text>
  <text x="632" y="94" text-anchor="middle" class="subtitle">s2: shift 4</text>

  <rect x="780" y="60" width="105" height="410" rx="10" class="cluster" fill="#dddddd" stroke="#999"/>
  <text x="832" y="78" text-anchor="middle" class="stage-label">Outputs</text>

  <!-- ========================================================= -->
  <!-- Wires: Stage 0, offset 1 -->
  <!-- black uses upper pin, blue uses lower pin -->
  <!-- ========================================================= -->

  <!-- black: sel=0, same lane -->
  <line x1="85" y1="113" x2="175" y2="113" class="same"/>
  <line x1="85" y1="153" x2="175" y2="153" class="same"/>
  <line x1="85" y1="193" x2="175" y2="193" class="same"/>
  <line x1="85" y1="233" x2="175" y2="233" class="same"/>
  <line x1="85" y1="273" x2="175" y2="273" class="same"/>
  <line x1="85" y1="313" x2="175" y2="313" class="same"/>
  <line x1="85" y1="353" x2="175" y2="353" class="same"/>
  <line x1="85" y1="393" x2="175" y2="393" class="same"/>

  <!-- blue: sel=1, lane i takes lane i-1 mod 8 -->
  <line x1="85" y1="407" x2="175" y2="127" class="shift"/>
  <line x1="85" y1="127" x2="175" y2="167" class="shift"/>
  <line x1="85" y1="167" x2="175" y2="207" class="shift"/>
  <line x1="85" y1="207" x2="175" y2="247" class="shift"/>
  <line x1="85" y1="247" x2="175" y2="287" class="shift"/>
  <line x1="85" y1="287" x2="175" y2="327" class="shift"/>
  <line x1="85" y1="327" x2="175" y2="367" class="shift"/>
  <line x1="85" y1="367" x2="175" y2="407" class="shift"/>

  <!-- ========================================================= -->
  <!-- Wires: Stage 1, offset 2 -->
  <!-- black output pin: upper; blue output pin: lower -->
  <!-- ========================================================= -->

  <!-- black: sel=0 -->
  <line x1="245" y1="113" x2="385" y2="113" class="same"/>
  <line x1="245" y1="153" x2="385" y2="153" class="same"/>
  <line x1="245" y1="193" x2="385" y2="193" class="same"/>
  <line x1="245" y1="233" x2="385" y2="233" class="same"/>
  <line x1="245" y1="273" x2="385" y2="273" class="same"/>
  <line x1="245" y1="313" x2="385" y2="313" class="same"/>
  <line x1="245" y1="353" x2="385" y2="353" class="same"/>
  <line x1="245" y1="393" x2="385" y2="393" class="same"/>

  <!-- blue: sel=1, lane i takes lane i-2 mod 8 -->
  <line x1="245" y1="367" x2="385" y2="127" class="shift"/>
  <line x1="245" y1="407" x2="385" y2="167" class="shift"/>
  <line x1="245" y1="127" x2="385" y2="207" class="shift"/>
  <line x1="245" y1="167" x2="385" y2="247" class="shift"/>
  <line x1="245" y1="207" x2="385" y2="287" class="shift"/>
  <line x1="245" y1="247" x2="385" y2="327" class="shift"/>
  <line x1="245" y1="287" x2="385" y2="367" class="shift"/>
  <line x1="245" y1="327" x2="385" y2="407" class="shift"/>

  <!-- ========================================================= -->
  <!-- Wires: Stage 2, offset 4 -->
  <!-- black output pin: upper; blue output pin: lower -->
  <!-- ========================================================= -->

  <!-- black: sel=0 -->
  <line x1="455" y1="113" x2="595" y2="113" class="same"/>
  <line x1="455" y1="153" x2="595" y2="153" class="same"/>
  <line x1="455" y1="193" x2="595" y2="193" class="same"/>
  <line x1="455" y1="233" x2="595" y2="233" class="same"/>
  <line x1="455" y1="273" x2="595" y2="273" class="same"/>
  <line x1="455" y1="313" x2="595" y2="313" class="same"/>
  <line x1="455" y1="353" x2="595" y2="353" class="same"/>
  <line x1="455" y1="393" x2="595" y2="393" class="same"/>

  <!-- blue: sel=1, lane i takes lane i-4 mod 8 -->
  <line x1="455" y1="287" x2="595" y2="127" class="shift"/>
  <line x1="455" y1="327" x2="595" y2="167" class="shift"/>
  <line x1="455" y1="367" x2="595" y2="207" class="shift"/>
  <line x1="455" y1="407" x2="595" y2="247" class="shift"/>
  <line x1="455" y1="127" x2="595" y2="287" class="shift"/>
  <line x1="455" y1="167" x2="595" y2="327" class="shift"/>
  <line x1="455" y1="207" x2="595" y2="367" class="shift"/>
  <line x1="455" y1="247" x2="595" y2="407" class="shift"/>

  <!-- ========================================================= -->
  <!-- Output wires -->
  <!-- ========================================================= -->

  <line x1="665" y1="120" x2="805" y2="120" class="outwire"/>
  <line x1="665" y1="160" x2="805" y2="160" class="outwire"/>
  <line x1="665" y1="200" x2="805" y2="200" class="outwire"/>
  <line x1="665" y1="240" x2="805" y2="240" class="outwire"/>
  <line x1="665" y1="280" x2="805" y2="280" class="outwire"/>
  <line x1="665" y1="320" x2="805" y2="320" class="outwire"/>
  <line x1="665" y1="360" x2="805" y2="360" class="outwire"/>
  <line x1="665" y1="400" x2="805" y2="400" class="outwire"/>

  <!-- ========================================================= -->
  <!-- Input nodes, height = 34, same as MUX -->
  <!-- ========================================================= -->

  <rect x="30" y="103" width="55" height="34" rx="6" class="box"/>
  <text x="57.5" y="120" class="node-label">in0</text>

  <rect x="30" y="143" width="55" height="34" rx="6" class="box"/>
  <text x="57.5" y="160" class="node-label">in1</text>

  <rect x="30" y="183" width="55" height="34" rx="6" class="box"/>
  <text x="57.5" y="200" class="node-label">in2</text>

  <rect x="30" y="223" width="55" height="34" rx="6" class="box"/>
  <text x="57.5" y="240" class="node-label">in3</text>

  <rect x="30" y="263" width="55" height="34" rx="6" class="box"/>
  <text x="57.5" y="280" class="node-label">in4</text>

  <rect x="30" y="303" width="55" height="34" rx="6" class="box"/>
  <text x="57.5" y="320" class="node-label">in5</text>

  <rect x="30" y="343" width="55" height="34" rx="6" class="box"/>
  <text x="57.5" y="360" class="node-label">in6</text>

  <rect x="30" y="383" width="55" height="34" rx="6" class="box"/>
  <text x="57.5" y="400" class="node-label">in7</text>

  <!-- ========================================================= -->
  <!-- Stage 0 MUX nodes -->
  <!-- ========================================================= -->

  <rect x="175" y="103" width="70" height="34" rx="6" class="box"/>
  <text x="210" y="116" class="node-label">MUX</text>
  <text x="210" y="130" class="small-label">lane 0</text>

  <rect x="175" y="143" width="70" height="34" rx="6" class="box"/>
  <text x="210" y="156" class="node-label">MUX</text>
  <text x="210" y="170" class="small-label">lane 1</text>

  <rect x="175" y="183" width="70" height="34" rx="6" class="box"/>
  <text x="210" y="196" class="node-label">MUX</text>
  <text x="210" y="210" class="small-label">lane 2</text>

  <rect x="175" y="223" width="70" height="34" rx="6" class="box"/>
  <text x="210" y="236" class="node-label">MUX</text>
  <text x="210" y="250" class="small-label">lane 3</text>

  <rect x="175" y="263" width="70" height="34" rx="6" class="box"/>
  <text x="210" y="276" class="node-label">MUX</text>
  <text x="210" y="290" class="small-label">lane 4</text>

  <rect x="175" y="303" width="70" height="34" rx="6" class="box"/>
  <text x="210" y="316" class="node-label">MUX</text>
  <text x="210" y="330" class="small-label">lane 5</text>

  <rect x="175" y="343" width="70" height="34" rx="6" class="box"/>
  <text x="210" y="356" class="node-label">MUX</text>
  <text x="210" y="370" class="small-label">lane 6</text>

  <rect x="175" y="383" width="70" height="34" rx="6" class="box"/>
  <text x="210" y="396" class="node-label">MUX</text>
  <text x="210" y="410" class="small-label">lane 7</text>

  <!-- ========================================================= -->
  <!-- Stage 1 MUX nodes -->
  <!-- ========================================================= -->

  <rect x="385" y="103" width="70" height="34" rx="6" class="box"/>
  <text x="420" y="116" class="node-label">MUX</text>
  <text x="420" y="130" class="small-label">lane 0</text>

  <rect x="385" y="143" width="70" height="34" rx="6" class="box"/>
  <text x="420" y="156" class="node-label">MUX</text>
  <text x="420" y="170" class="small-label">lane 1</text>

  <rect x="385" y="183" width="70" height="34" rx="6" class="box"/>
  <text x="420" y="196" class="node-label">MUX</text>
  <text x="420" y="210" class="small-label">lane 2</text>

  <rect x="385" y="223" width="70" height="34" rx="6" class="box"/>
  <text x="420" y="236" class="node-label">MUX</text>
  <text x="420" y="250" class="small-label">lane 3</text>

  <rect x="385" y="263" width="70" height="34" rx="6" class="box"/>
  <text x="420" y="276" class="node-label">MUX</text>
  <text x="420" y="290" class="small-label">lane 4</text>

  <rect x="385" y="303" width="70" height="34" rx="6" class="box"/>
  <text x="420" y="316" class="node-label">MUX</text>
  <text x="420" y="330" class="small-label">lane 5</text>

  <rect x="385" y="343" width="70" height="34" rx="6" class="box"/>
  <text x="420" y="356" class="node-label">MUX</text>
  <text x="420" y="370" class="small-label">lane 6</text>

  <rect x="385" y="383" width="70" height="34" rx="6" class="box"/>
  <text x="420" y="396" class="node-label">MUX</text>
  <text x="420" y="410" class="small-label">lane 7</text>

  <!-- ========================================================= -->
  <!-- Stage 2 MUX nodes -->
  <!-- ========================================================= -->

  <rect x="595" y="103" width="70" height="34" rx="6" class="box"/>
  <text x="630" y="116" class="node-label">MUX</text>
  <text x="630" y="130" class="small-label">lane 0</text>

  <rect x="595" y="143" width="70" height="34" rx="6" class="box"/>
  <text x="630" y="156" class="node-label">MUX</text>
  <text x="630" y="170" class="small-label">lane 1</text>

  <rect x="595" y="183" width="70" height="34" rx="6" class="box"/>
  <text x="630" y="196" class="node-label">MUX</text>
  <text x="630" y="210" class="small-label">lane 2</text>

  <rect x="595" y="223" width="70" height="34" rx="6" class="box"/>
  <text x="630" y="236" class="node-label">MUX</text>
  <text x="630" y="250" class="small-label">lane 3</text>

  <rect x="595" y="263" width="70" height="34" rx="6" class="box"/>
  <text x="630" y="276" class="node-label">MUX</text>
  <text x="630" y="290" class="small-label">lane 4</text>

  <rect x="595" y="303" width="70" height="34" rx="6" class="box"/>
  <text x="630" y="316" class="node-label">MUX</text>
  <text x="630" y="330" class="small-label">lane 5</text>

  <rect x="595" y="343" width="70" height="34" rx="6" class="box"/>
  <text x="630" y="356" class="node-label">MUX</text>
  <text x="630" y="370" class="small-label">lane 6</text>

  <rect x="595" y="383" width="70" height="34" rx="6" class="box"/>
  <text x="630" y="396" class="node-label">MUX</text>
  <text x="630" y="410" class="small-label">lane 7</text>

  <!-- ========================================================= -->
  <!-- Output nodes, height = 34, same as MUX -->
  <!-- ========================================================= -->

  <rect x="805" y="103" width="60" height="34" rx="6" class="box"/>
  <text x="835" y="120" class="node-label">out0</text>

  <rect x="805" y="143" width="60" height="34" rx="6" class="box"/>
  <text x="835" y="160" class="node-label">out1</text>

  <rect x="805" y="183" width="60" height="34" rx="6" class="box"/>
  <text x="835" y="200" class="node-label">out2</text>

  <rect x="805" y="223" width="60" height="34" rx="6" class="box"/>
  <text x="835" y="240" class="node-label">out3</text>

  <rect x="805" y="263" width="60" height="34" rx="6" class="box"/>
  <text x="835" y="280" class="node-label">out4</text>

  <rect x="805" y="303" width="60" height="34" rx="6" class="box"/>
  <text x="835" y="320" class="node-label">out5</text>

  <rect x="805" y="343" width="60" height="34" rx="6" class="box"/>
  <text x="835" y="360" class="node-label">out6</text>

  <rect x="805" y="383" width="60" height="34" rx="6" class="box"/>
  <text x="835" y="400" class="node-label">out7</text>

  <!-- Legend -->
  <line x1="300" y1="485" x2="360" y2="485" class="same"/>
  <text x="375" y="485" dominant-baseline="middle" class="subtitle">
    sel=0: take same lane, upper pin
  </text>
  <line x1="300" y1="505" x2="360" y2="505" class="shift"/>
  <text x="375" y="505" dominant-baseline="middle" class="subtitle">
    sel=1: take shifted lane, lower pin
  </text>
</svg>