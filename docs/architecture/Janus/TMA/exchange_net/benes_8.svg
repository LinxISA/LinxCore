<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1000 500">
  <style>
    .title { font: 18px sans-serif; font-weight: 600; }
    .subtitle { font: 13px sans-serif; fill: #444; }
    .stage-label { font: 13px sans-serif; font-weight: 600; }
    .node-label { font: 12px sans-serif; text-anchor: middle; dominant-baseline: middle; }
    .small-label { font: 10px sans-serif; text-anchor: middle; dominant-baseline: middle; fill: #444; }
    .box { fill: #f8f8f8; stroke: #333; stroke-width: 1; }
    .switch { fill: #f8f8f8; stroke: #333; stroke-width: 1.1; }
    .cluster { fill-opacity: 0.16; stroke-width: 1.2; }
    .wire { stroke: #555; stroke-width: 1.4; opacity: 0.75; }
    .internal-pass { stroke: #777; stroke-width: 1; opacity: 0.45; }
    .internal-cross { stroke: #1f77b4; stroke-width: 1; opacity: 0.45; }
  </style>
  <defs>
    <g id="sw2x2">
      <rect x="0" y="0" width="80" height="74" rx="8" class="switch"/>
<!--internal pass lines-->
      <line x1="10" y1="17" x2="70" y2="17" class="internal-pass"/>
      <line x1="10" y1="57" x2="70" y2="57" class="internal-pass"/>
<!--internal cross lines-->
      <line x1="10" y1="17" x2="70" y2="57" class="internal-cross"/>
      <line x1="10" y1="57" x2="70" y2="17" class="internal-cross"/>
      <text x="40" y="32" class="node-label">2×2</text>
      <text x="40" y="47" class="small-label">SW</text>
    </g>
  </defs>
<!--Title-->
  <text x="500" y="24" text-anchor="middle" class="title">
    8×8 Benes Network
  </text>
  <text x="500" y="44" text-anchor="middle" class="subtitle">
    5 stages of 2×2 switches: butterfly + inverse butterfly, rearrangeably non-blocking
  </text>
<!--Background clusters-->
  <rect x="10" y="70" width="95" height="360" rx="10" class="cluster" fill="#dddddd" stroke="#999"/>
  <text x="57" y="88" text-anchor="middle" class="stage-label">Inputs</text>
  <rect x="135" y="70" width="110" height="360" rx="10" class="cluster" fill="#aaccee" stroke="#6c9fc7"/>
  <text x="190" y="88" text-anchor="middle" class="stage-label">Stage 0</text>
  <text x="190" y="104" text-anchor="middle" class="subtitle">xor 1</text>
  <rect x="285" y="70" width="110" height="360" rx="10" class="cluster" fill="#bbddbb" stroke="#80b080"/>
  <text x="340" y="88" text-anchor="middle" class="stage-label">Stage 1</text>
  <text x="340" y="104" text-anchor="middle" class="subtitle">xor 2</text>
  <rect x="435" y="70" width="110" height="360" rx="10" class="cluster" fill="#ffddaa" stroke="#d6a45f"/>
  <text x="490" y="88" text-anchor="middle" class="stage-label">Stage 2</text>
  <text x="490" y="104" text-anchor="middle" class="subtitle">xor 4</text>
  <rect x="585" y="70" width="110" height="360" rx="10" class="cluster" fill="#bbddbb" stroke="#80b080"/>
  <text x="640" y="88" text-anchor="middle" class="stage-label">Stage 3</text>
  <text x="640" y="104" text-anchor="middle" class="subtitle">xor 2</text>
  <rect x="735" y="70" width="110" height="360" rx="10" class="cluster" fill="#aaccee" stroke="#6c9fc7"/>
  <text x="790" y="88" text-anchor="middle" class="stage-label">Stage 4</text>
  <text x="790" y="104" text-anchor="middle" class="subtitle">xor 1</text>
  <rect x="895" y="70" width="95" height="360" rx="10" class="cluster" fill="#dddddd" stroke="#999"/>
  <text x="942" y="88" text-anchor="middle" class="stage-label">Outputs</text>
<!--=========================================================-->
<!--Wires: inputs to Stage 0-->
<!--=========================================================-->
  <line x1="85" y1="110" x2="150" y2="110" class="wire"/>
  <line x1="85" y1="150" x2="150" y2="150" class="wire"/>
  <line x1="85" y1="190" x2="150" y2="190" class="wire"/>
  <line x1="85" y1="230" x2="150" y2="230" class="wire"/>
  <line x1="85" y1="270" x2="150" y2="270" class="wire"/>
  <line x1="85" y1="310" x2="150" y2="310" class="wire"/>
  <line x1="85" y1="350" x2="150" y2="350" class="wire"/>
  <line x1="85" y1="390" x2="150" y2="390" class="wire"/>
<!--=========================================================-->
<!--Wires: Stage 0 -> Stage 1-->
<!--permutation from [0,1,2,3,4,5,6,7] to [0,2,1,3,4,6,5,7]-->
<!--=========================================================-->
  <line x1="230" y1="110" x2="300" y2="110" class="wire"/>
  <line x1="230" y1="150" x2="300" y2="190" class="wire"/>
  <line x1="230" y1="190" x2="300" y2="150" class="wire"/>
  <line x1="230" y1="230" x2="300" y2="230" class="wire"/>
  <line x1="230" y1="270" x2="300" y2="270" class="wire"/>
  <line x1="230" y1="310" x2="300" y2="350" class="wire"/>
  <line x1="230" y1="350" x2="300" y2="310" class="wire"/>
  <line x1="230" y1="390" x2="300" y2="390" class="wire"/>
<!--=========================================================-->
<!--Wires: Stage 1 -> Stage 2-->
<!--permutation from [0,2,1,3,4,6,5,7] to [0,4,1,5,2,6,3,7]-->
<!--=========================================================-->
  <line x1="380" y1="110" x2="450" y2="110" class="wire"/>
  <line x1="380" y1="190" x2="450" y2="190" class="wire"/>
  <line x1="380" y1="150" x2="450" y2="270" class="wire"/>
  <line x1="380" y1="230" x2="450" y2="350" class="wire"/>
  <line x1="380" y1="270" x2="450" y2="150" class="wire"/>
  <line x1="380" y1="350" x2="450" y2="310" class="wire"/>
  <line x1="380" y1="310" x2="450" y2="230" class="wire"/>
  <line x1="380" y1="390" x2="450" y2="390" class="wire"/>
<!--=========================================================-->
<!--Wires: Stage 2 -> Stage 3-->
<!--mirror of previous stage-->
<!--permutation from [0,4,1,5,2,6,3,7] to [0,2,1,3,4,6,5,7]-->
<!--=========================================================-->
  <line x1="530" y1="110" x2="600" y2="110" class="wire"/>
  <line x1="530" y1="190" x2="600" y2="190" class="wire"/>
  <line x1="530" y1="270" x2="600" y2="150" class="wire"/>
  <line x1="530" y1="350" x2="600" y2="230" class="wire"/>
  <line x1="530" y1="150" x2="600" y2="270" class="wire"/>
  <line x1="530" y1="310" x2="600" y2="350" class="wire"/>
  <line x1="530" y1="230" x2="600" y2="310" class="wire"/>
  <line x1="530" y1="390" x2="600" y2="390" class="wire"/>
<!--=========================================================-->
<!--Wires: Stage 3 -> Stage 4-->
<!--mirror of Stage 0 -> Stage 1-->
<!--permutation from [0,2,1,3,4,6,5,7] to [0,1,2,3,4,5,6,7]-->
<!--=========================================================-->
  <line x1="680" y1="110" x2="750" y2="110" class="wire"/>
  <line x1="680" y1="190" x2="750" y2="150" class="wire"/>
  <line x1="680" y1="150" x2="750" y2="190" class="wire"/>
  <line x1="680" y1="230" x2="750" y2="230" class="wire"/>
  <line x1="680" y1="270" x2="750" y2="270" class="wire"/>
  <line x1="680" y1="350" x2="750" y2="310" class="wire"/>
  <line x1="680" y1="310" x2="750" y2="350" class="wire"/>
  <line x1="680" y1="390" x2="750" y2="390" class="wire"/>
<!--=========================================================-->
<!--Wires: Stage 4 to outputs-->
<!--=========================================================-->
  <line x1="830" y1="110" x2="920" y2="110" class="wire"/>
  <line x1="830" y1="150" x2="920" y2="150" class="wire"/>
  <line x1="830" y1="190" x2="920" y2="190" class="wire"/>
  <line x1="830" y1="230" x2="920" y2="230" class="wire"/>
  <line x1="830" y1="270" x2="920" y2="270" class="wire"/>
  <line x1="830" y1="310" x2="920" y2="310" class="wire"/>
  <line x1="830" y1="350" x2="920" y2="350" class="wire"/>
  <line x1="830" y1="390" x2="920" y2="390" class="wire"/>
<!--=========================================================-->
<!--Input nodes-->
<!--=========================================================-->
  <rect x="25" y="93" width="60" height="34" rx="6" class="box"/>
  <text x="55" y="110" class="node-label">in0</text>
  <rect x="25" y="133" width="60" height="34" rx="6" class="box"/>
  <text x="55" y="150" class="node-label">in1</text>
  <rect x="25" y="173" width="60" height="34" rx="6" class="box"/>
  <text x="55" y="190" class="node-label">in2</text>
  <rect x="25" y="213" width="60" height="34" rx="6" class="box"/>
  <text x="55" y="230" class="node-label">in3</text>
  <rect x="25" y="253" width="60" height="34" rx="6" class="box"/>
  <text x="55" y="270" class="node-label">in4</text>
  <rect x="25" y="293" width="60" height="34" rx="6" class="box"/>
  <text x="55" y="310" class="node-label">in5</text>
  <rect x="25" y="333" width="60" height="34" rx="6" class="box"/>
  <text x="55" y="350" class="node-label">in6</text>
  <rect x="25" y="373" width="60" height="34" rx="6" class="box"/>
  <text x="55" y="390" class="node-label">in7</text>
<!--=========================================================-->
<!--Stage 0 switches-->
<!--=========================================================-->
  <use href="#sw2x2" x="150" y="93"/>
  <use href="#sw2x2" x="150" y="173"/>
  <use href="#sw2x2" x="150" y="253"/>
  <use href="#sw2x2" x="150" y="333"/>
<!--Stage 1 switches-->
  <use href="#sw2x2" x="300" y="93"/>
  <use href="#sw2x2" x="300" y="173"/>
  <use href="#sw2x2" x="300" y="253"/>
  <use href="#sw2x2" x="300" y="333"/>
<!--Stage 2 switches-->
  <use href="#sw2x2" x="450" y="93"/>
  <use href="#sw2x2" x="450" y="173"/>
  <use href="#sw2x2" x="450" y="253"/>
  <use href="#sw2x2" x="450" y="333"/>
<!--Stage 3 switches-->
  <use href="#sw2x2" x="600" y="93"/>
  <use href="#sw2x2" x="600" y="173"/>
  <use href="#sw2x2" x="600" y="253"/>
  <use href="#sw2x2" x="600" y="333"/>
<!--Stage 4 switches-->
  <use href="#sw2x2" x="750" y="93"/>
  <use href="#sw2x2" x="750" y="173"/>
  <use href="#sw2x2" x="750" y="253"/>
  <use href="#sw2x2" x="750" y="333"/>
<!--=========================================================-->
<!--Output nodes-->
<!--=========================================================-->
  <rect x="920" y="93" width="60" height="34" rx="6" class="box"/>
  <text x="950" y="110" class="node-label">out0</text>
  <rect x="920" y="133" width="60" height="34" rx="6" class="box"/>
  <text x="950" y="150" class="node-label">out1</text>
  <rect x="920" y="173" width="60" height="34" rx="6" class="box"/>
  <text x="950" y="190" class="node-label">out2</text>
  <rect x="920" y="213" width="60" height="34" rx="6" class="box"/>
  <text x="950" y="230" class="node-label">out3</text>
  <rect x="920" y="253" width="60" height="34" rx="6" class="box"/>
  <text x="950" y="270" class="node-label">out4</text>
  <rect x="920" y="293" width="60" height="34" rx="6" class="box"/>
  <text x="950" y="310" class="node-label">out5</text>
  <rect x="920" y="333" width="60" height="34" rx="6" class="box"/>
  <text x="950" y="350" class="node-label">out6</text>
  <rect x="920" y="373" width="60" height="34" rx="6" class="box"/>
  <text x="950" y="390" class="node-label">out7</text>
<!--Legend-->
  <text x="500" y="455" text-anchor="middle" class="subtitle">
    Each 2×2 switch can be configured as pass-through or cross.
  </text>
  <text x="500" y="475" text-anchor="middle" class="subtitle">
    The topology is left-right symmetric: Stage 0/4, Stage 1/3, and middle Stage 2.
  </text>
</svg>