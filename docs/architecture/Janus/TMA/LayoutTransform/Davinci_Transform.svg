<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97706"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="nzGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="ndGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="110%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="880" height="480" fill="url(#bgGrad)" rx="12"/>
  <rect x="0" y="0" width="880" height="52" fill="#1E293B" rx="12 12 0 0"/>
  <rect x="0" y="40" width="880" height="12" fill="#1E293B"/>

  <text x="440" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#F8FAFC" letter-spacing="0.5">方案 B — L1 / UB 分立架构（Davinci Transform）</text>

  <!-- Legend -->
  <line x1="580" y1="72" x2="620" y2="72" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>
  <text x="628" y="76" font-size="10" fill="#64748B">同格式</text>
  <line x1="700" y1="72" x2="740" y2="72" stroke="#D97706" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="748" y="76" font-size="10" fill="#D97706">格式转换</text>

  <!-- === 共享组件 === -->
  <!-- Cube (NZ) -->
  <rect x="60" y="120" width="140" height="60" rx="10" fill="url(#nzGrad)" filter="url(#sh)"/>
  <text x="130" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Cube</text>
  <text x="130" y="166" text-anchor="middle" font-size="11" fill="#BFDBFE">NZ</text>

  <!-- Vec (ND) -->
  <rect x="60" y="320" width="140" height="60" rx="10" fill="url(#ndGrad)" filter="url(#sh)"/>
  <text x="130" y="348" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Vec</text>
  <text x="130" y="366" text-anchor="middle" font-size="11" fill="#A7F3D0">ND</text>

  <!-- GM (ND) — 与 TR 等高 -->
  <rect x="720" y="120" width="140" height="260" rx="10" fill="url(#ndGrad)" filter="url(#sh)"/>
  <text x="790" y="248" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">GM</text>
  <text x="790" y="268" text-anchor="middle" font-size="11" fill="#A7F3D0">ND</text>

  <!-- === 方案B特有 === -->
  <!-- L1 (NZ) -->
  <rect x="385" y="120" width="150" height="105" rx="10" fill="url(#nzGrad)" filter="url(#sh)"/>
  <text x="460" y="168" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">L1</text>
  <text x="460" y="188" text-anchor="middle" font-size="11" fill="#BFDBFE">NZ</text>

  <!-- UB (ND) -->
  <rect x="385" y="275" width="150" height="105" rx="10" fill="url(#ndGrad)" filter="url(#sh)"/>
  <text x="460" y="323" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">UB</text>
  <text x="460" y="343" text-anchor="middle" font-size="11" fill="#A7F3D0">ND</text>

  <!-- === 连线 === -->
  <!-- Cube ↔ L1 双向 -->
  <line x1="200" y1="150" x2="377" y2="150" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>
  <line x1="377" y1="162" x2="200" y2="162" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>
  <!-- Vec ↔ UB 双向 -->
  <line x1="200" y1="350" x2="377" y2="350" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>
  <line x1="377" y1="362" x2="200" y2="362" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>

  <!-- L1 ↔ UB 双向格式转换 -->
  <line x1="445" y1="225" x2="445" y2="267" stroke="#D97706" stroke-width="2.5" marker-end="url(#arrOrange)"/>
  <line x1="475" y1="267" x2="475" y2="225" stroke="#D97706" stroke-width="2.5" marker-end="url(#arrOrange)"/>
  <rect x="430" y="238" width="70" height="18" rx="4" fill="#FEF3C7"/>
  <text x="465" y="251" text-anchor="middle" font-size="9" font-weight="600" fill="#D97706">NZ ↔ ND</text>

  <!-- Cube → UB (跨级，虚线) -->
  <polyline points="200,170 290,170 290,327 377,327" stroke="#D97706" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrOrange)"/>
  <text x="295" y="255" font-size="9" fill="#D97706">NZ→ND</text>

  <!-- Cube → GM (跨级，虚线) -->
  <polyline points="130,120 130,90 790,90 790,112" stroke="#D97706" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrOrange)"/>
  <text x="440" y="84" font-size="9" fill="#D97706">NZ → ND</text>

  <!-- GM → L1 -->
  <line x1="720" y1="172" x2="543" y2="172" stroke="#D97706" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="630" y="166" font-size="9" fill="#D97706">ND→NZ</text>

  <!-- UB → GM -->
  <line x1="535" y1="327" x2="712" y2="327" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>

  <!-- 方案标签 -->
  <rect x="30" y="440" width="80" height="24" rx="6" fill="#1E293B"/>
  <text x="70" y="456" text-anchor="middle" font-size="11" font-weight="600" fill="#F8FAFC">方案 B</text>
</svg>
