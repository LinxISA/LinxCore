<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97706"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="nzGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="ndGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="ndpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="cvtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="110%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="880" height="480" fill="url(#bgGrad)" rx="12"/>
  <rect x="0" y="0" width="880" height="52" fill="#1E293B" rx="12 12 0 0"/>
  <rect x="0" y="40" width="880" height="12" fill="#1E293B"/>

  <text x="440" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#F8FAFC" letter-spacing="0.5">方案 D — Superscalar Transform</text>

  <!-- Legend -->
  <line x1="480" y1="72" x2="520" y2="72" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>
  <text x="528" y="76" font-size="10" fill="#64748B">同域</text>
  <line x1="580" y1="72" x2="620" y2="72" stroke="#D97706" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="628" y="76" font-size="10" fill="#D97706">NZ↔ND'</text>
  <line x1="700" y1="72" x2="740" y2="72" stroke="#059669" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="748" y="76" font-size="10" fill="#059669">ND'↔ND</text>

  <!-- === 共享组件 === -->
  <!-- Cube (NZ) -->
  <rect x="60" y="120" width="140" height="60" rx="10" fill="url(#nzGrad)" filter="url(#sh)"/>
  <text x="130" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Cube</text>
  <text x="130" y="166" text-anchor="middle" font-size="11" fill="#BFDBFE">NZ</text>

  <!-- Vec (ND') -->
  <rect x="60" y="320" width="140" height="60" rx="10" fill="url(#ndGrad)" filter="url(#sh)"/>
  <text x="130" y="348" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Vec</text>
  <text x="130" y="366" text-anchor="middle" font-size="11" fill="#A7F3D0">ND'</text>

  <!-- GM (ND) -->
  <rect x="720" y="120" width="140" height="260" rx="10" fill="url(#ndGrad)" filter="url(#sh)"/>
  <text x="790" y="248" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">GM</text>
  <text x="790" y="268" text-anchor="middle" font-size="11" fill="#A7F3D0">ND</text>

  <!-- === 方案D特有 === -->
  <!-- 新组件 TPU（Tile Permute Unit） -->
  <rect x="235" y="120" width="105" height="60" rx="10" fill="url(#cvtGrad)" filter="url(#sh)"/>
  <text x="287" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">TPU</text>
  <text x="287" y="166" text-anchor="middle" font-size="10" fill="#FEF3C7">NZ → ND'</text>

  <!-- TR (ND') -->
  <rect x="385" y="120" width="150" height="260" rx="10" fill="url(#ndGrad)" filter="url(#sh)"/>
  <text x="460" y="245" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">TR</text>
  <text x="460" y="268" text-anchor="middle" font-size="11" fill="#A7F3D0">ND'</text>

  <!-- TMA (ND') -->
  <rect x="580" y="200" width="100" height="80" rx="10" fill="url(#ndGrad)" filter="url(#sh)"/>
  <text x="630" y="235" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">TMA</text>
  <text x="630" y="255" text-anchor="middle" font-size="10" fill="#A7F3D0">ND'↔ND</text>

  <!-- === 连线 === -->
  <!-- Cube ↔ TPU 双向 (NZ→ND', 橙色) -->
  <line x1="200" y1="150" x2="227" y2="150" stroke="#D97706" stroke-width="2.5" marker-end="url(#arrOrange)"/>
  <line x1="227" y1="162" x2="200" y2="162" stroke="#D97706" stroke-width="2.5" marker-end="url(#arrOrange)"/>

  <!-- TPU ↔ TR 双向 (同域 ND', 灰色) -->
  <line x1="340" y1="150" x2="377" y2="150" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>
  <line x1="377" y1="162" x2="340" y2="162" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>

  <!-- Vec ↔ TR 双向 (同域 ND', 灰色) -->
  <line x1="200" y1="350" x2="377" y2="350" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>
  <line x1="377" y1="362" x2="200" y2="362" stroke="#6B7280" stroke-width="2" marker-end="url(#arrGray)"/>

  <!-- TR ↔ TMA (ND'↔ND 转换, 绿色双向) -->
  <line x1="535" y1="225" x2="572" y2="225" stroke="#059669" stroke-width="2.5" marker-end="url(#arrGreen)"/>
  <line x1="572" y1="255" x2="535" y2="255" stroke="#059669" stroke-width="2.5" marker-end="url(#arrGreen)"/>
  <rect x="535" y="232" width="45" height="16" rx="3" fill="#D1FAE5"/>
  <text x="557" y="244" text-anchor="middle" font-size="8" font-weight="600" fill="#059669">ND'↔ND</text>

  <!-- TMA ↔ GM (ND'↔ND 转换, 绿色双向) -->
  <line x1="680" y1="225" x2="712" y2="225" stroke="#059669" stroke-width="2.5" marker-end="url(#arrGreen)"/>
  <line x1="712" y1="255" x2="680" y2="255" stroke="#059669" stroke-width="2.5" marker-end="url(#arrGreen)"/>

  <!-- 方案标签 -->
  <rect x="30" y="440" width="80" height="24" rx="6" fill="#1E293B"/>
  <text x="70" y="456" text-anchor="middle" font-size="11" font-weight="600" fill="#F8FAFC">方案 D</text>
</svg>
